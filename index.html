<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키워드 이슈 보고서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #cc785c;
      --primary-active: #a9583e;
      --primary-disabled: #e6dfd8;
      --ink: #141413;
      --body: #3d3d3a;
      --body-strong: #252523;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --canvas: #faf9f5;
      --surface-soft: #f5f0e8;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --surface-dark-soft: #1f1e1b;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --on-dark-soft: #a09d96;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-pill: 9999px;
      --font-display: "Cormorant Garamond", "Times New Roman", serif;
      --font-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      color: var(--body);
      background: var(--canvas);
    }

    .top-nav {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--hairline);
      background: var(--canvas);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 18px;
      height: 18px;
      color: var(--ink);
    }

    .badge-coral {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: var(--on-primary);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 24px 32px;
    }

    .hero h1 {
      margin: 16px 0 12px;
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 48px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -1px;
      color: var(--ink);
      max-width: 720px;
    }

    .hero p {
      margin: 0;
      max-width: 640px;
      color: var(--body);
      font-size: 16px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 96px;
    }

    .layout {
      display: grid;
      gap: 24px;
    }

    .feature-card {
      background: var(--surface-card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 32px;
    }

    .card-title {
      margin: 0 0 20px;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--ink);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--body-strong);
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      height: 40px;
      padding: 10px 14px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      background: var(--canvas);
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.15);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .row input { flex: 1; }

    button {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      border: none;
      border-radius: var(--radius-md);
      height: 40px;
      padding: 12px 20px;
    }

    .btn-secondary {
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
    }

    .btn-secondary:active {
      background: var(--surface-soft);
    }

    .btn-primary {
      width: 100%;
      margin-top: 8px;
      background: var(--primary);
      color: var(--on-primary);
    }

    .btn-primary:active {
      background: var(--primary-active);
    }

    .btn-primary:disabled {
      background: var(--primary-disabled);
      color: var(--muted);
      cursor: not-allowed;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      min-height: 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
    }

    .tag button {
      background: transparent;
      color: var(--primary);
      padding: 0;
      height: auto;
      font-size: 16px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0 20px;
      cursor: pointer;
      font-size: 14px;
      color: var(--body);
    }

    .results-section {
      display: none;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--hairline);
    }

    .results-section.visible {
      display: block;
    }

    .results-header {
      margin-bottom: 20px;
    }

    .results-title {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.3px;
      color: var(--ink);
    }

    .results-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .results-summary {
      margin-bottom: 24px;
      padding: 20px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
    }

    .results-summary h3,
    .results-insights h3,
    .results-issues h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
    }

    .results-summary p,
    .results-insights p {
      margin: 0;
      color: var(--body);
      line-height: 1.55;
    }

    .issue-list {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .issue-item {
      padding: 20px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
    }

    .issue-item h4 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
    }

    .issue-meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .issue-item p {
      margin: 0 0 8px;
      color: var(--body);
      line-height: 1.55;
    }

    .issue-item a {
      color: var(--primary);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
    }

    .results-insights {
      padding: 24px;
      background: var(--surface-dark);
      border-radius: var(--radius-lg);
      color: var(--on-dark-soft);
    }

    .results-insights h3 {
      color: var(--on-dark);
    }

    .results-insights p {
      color: var(--on-dark-soft);
    }

    .footer {
      background: var(--surface-dark);
      color: var(--on-dark-soft);
      padding: 48px 24px;
      font-size: 14px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer strong {
      display: block;
      color: var(--on-dark);
      margin-bottom: 8px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Issue Report</span>
    </div>
    <span class="badge-coral">Beta</span>
  </nav>

  <header class="hero">
    <span class="badge-coral" style="background:var(--surface-card);color:var(--ink);letter-spacing:1px;">Weekly Brief</span>
    <h1>키워드 이슈 보고서</h1>
    <p>최근 7일 이내 이슈를 수집해 보고서를 생성하고 이메일로 발송합니다.</p>
  </header>

  <main class="app">
    <div class="layout">
      <section class="feature-card">
        <h2 class="card-title">보고서 생성</h2>

        <label for="keywordInput">키워드</label>
        <div class="row">
          <input id="keywordInput" type="text" placeholder="예: AI 규제">
          <button class="btn-secondary" type="button" id="addKeywordBtn">추가</button>
        </div>
        <div class="tags" id="keywordTags"></div>

        <label for="emailInput">수신 이메일</label>
        <input id="emailInput" type="email" placeholder="user@example.com" required>

        <button class="btn-primary" type="button" id="submitBtn">보고서 생성 및 이메일 발송</button>

        <div id="resultsSection" class="results-section">
          <div class="results-header">
            <h3 class="results-title" id="resultsTitle"></h3>
            <p class="results-meta" id="generatedAt"></p>
          </div>

          <div class="results-summary">
            <h3>요약</h3>
            <p id="resultsSummary"></p>
          </div>

          <div class="results-issues">
            <h3>주요 이슈</h3>
            <div class="issue-list" id="issueList"></div>
          </div>

          <div class="results-insights">
            <h3>트렌드 및 시사점</h3>
            <p id="resultsInsights"></p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <strong>키워드 이슈 보고서 서비스</strong>
      Gemini + Tavily 기반 · 최근 7일 이슈 수집
    </div>
  </footer>

  <script>
    const DEFAULT_API_BASE = "https://gayoungg111-test.vercel.app";
    const API_BASE =
      window.location.protocol === "file:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? (window.location.protocol === "file:" ? DEFAULT_API_BASE : "")
        : "";

    const keywords = [];
    const keywordInput = document.getElementById("keywordInput");
    const keywordTags = document.getElementById("keywordTags");
    const emailInput = document.getElementById("emailInput");
    const submitBtn = document.getElementById("submitBtn");
    const resultsSection = document.getElementById("resultsSection");
    const resultsTitle = document.getElementById("resultsTitle");
    const generatedAt = document.getElementById("generatedAt");
    const resultsSummary = document.getElementById("resultsSummary");
    const issueList = document.getElementById("issueList");
    const resultsInsights = document.getElementById("resultsInsights");

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderResults(data) {
      resultsTitle.textContent = data.title || "보고서";
      const emailStatus = data.email_sent
        ? " · 이메일 발송 완료"
        : " · 이메일 미발송";
      generatedAt.textContent =
        "생성 시각: " +
        new Date(data.generated_at).toLocaleString("ko-KR") +
        emailStatus;
      resultsSummary.textContent = data.summary || "요약 정보가 없습니다.";

      if (data.issues && data.issues.length > 0) {
        issueList.innerHTML = data.issues
          .map(
            (issue) => `
              <article class="issue-item">
                <h4>${escapeHtml(issue.title)}</h4>
                <p class="issue-meta">${escapeHtml(issue.date)} · ${escapeHtml(issue.source)}</p>
                <p>${escapeHtml(issue.summary)}</p>
                <a href="${escapeHtml(issue.url)}" target="_blank" rel="noopener noreferrer">원문 보기</a>
              </article>
            `,
          )
          .join("");
      } else {
        issueList.innerHTML =
          '<p style="margin:0;color:var(--muted);">수집된 이슈가 없습니다.</p>';
      }

      resultsInsights.textContent =
        data.insights || "시사점 정보가 없습니다.";
      resultsSection.classList.add("visible");
      resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderTags() {
      keywordTags.innerHTML = "";
      keywords.forEach((keyword) => {
        const span = document.createElement("span");
        span.className = "tag";
        span.innerHTML = `${keyword}<button type="button" aria-label="remove">×</button>`;
        span.querySelector("button").addEventListener("click", () => {
          const index = keywords.indexOf(keyword);
          if (index >= 0) keywords.splice(index, 1);
          renderTags();
        });
        keywordTags.appendChild(span);
      });
    }

    function addKeyword() {
      const value = keywordInput.value.trim();
      if (!value || keywords.includes(value) || keywords.length >= 10) return;
      keywords.push(value);
      keywordInput.value = "";
      renderTags();
    }

    async function createReport() {
      if (keywords.length === 0) {
        alert("키워드를 1개 이상 추가해 주세요.");
        return;
      }

      const email = emailInput.value.trim();
      if (!email) {
        alert("수신 이메일을 입력해 주세요.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "생성 및 발송 중...";
      resultsSection.classList.remove("visible");

      try {
        const response = await fetch(`${API_BASE}/api/reports`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            keywords,
            recipient_email: email,
            send_email: true,
          }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || "보고서 생성에 실패했습니다.");
        }

        renderResults(data);
      } catch (error) {
        alert(error.message || "요청에 실패했습니다.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "보고서 생성 및 이메일 발송";
      }
    }

    document.getElementById("addKeywordBtn").addEventListener("click", addKeyword);
    keywordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addKeyword();
      }
    });
    submitBtn.addEventListener("click", createReport);
    renderTags();
  </script>
</body>
</html>
